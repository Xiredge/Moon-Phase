<!DOCTYPE html>
{% load static %}

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon Phase</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

  <body>
    <nav class="navbar navbar-expand-md navbar-dark fixed-top" aria-label="Fourth navbar example">
        <div class="container-fluid"> <a class="navbar-brand" href=""><h1 id="webTitle">Moon Phase</h1></a>
            <div class="collapse navbar-collapse" id="navbarsExample04">
                <!--<ul class="navbar-nav ms-auto pt-0 mb-md-0">
                    <li class="nav-item m-0"> <a class="nav-link" href="#About"><h4>About</h4></a> </li>
                    <li class="nav-item m-0"> <a class="nav-link" href="#Projects"><h4>Projects</h4></a> </li>
                    <li class="nav-item m-0"> <a class="nav-link" href="#Contact"><h4>Contact</h4></a> </li>
                </ul>-->
            </div>
        </div>
    </nav>

    <div id="mainDiv"
      class="container text-center py-5 min-vh-100 d-flex justify-content-between align-items-center flex-wrap"
    >
      <div class="left">
        <div class="rounded-box">
          {% if moon %}
          <label>{{ moon.Dtoday }} is a</label>
          <label>{{ moon.phase }}</label> {% endif %}
          <label>{{ displays }}</label>
        </div>
      </div>
      <div class="right">
        <div class="rounded-box-display">
          <img src="{% static moon.emoji %}" alt="Moon">
        </div>
        <form method="GET" action="{% url 'home' %}">
          <label id="datelabel">Select Date</label> <br />
          <input type="date" name="date" id="date" required /> <br />
          <button type="submit" id="checkBtn">Get Moon Phase</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
